<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
    <style>
        .pulse {
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% { r: 5; fill: #4facfe; opacity: 0.8; }
            100% { r: 8; fill: #00f2fe; opacity: 1; filter: drop-shadow(0 0 5px #00f2fe); }
        }
        .text-title {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            font-size: 32px;
            fill: #ffffff;
            text-anchor: middle;
        }
        .line-flow {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: flow 3s linear infinite;
        }
        @keyframes flow {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
    <rect width="100%" height="100%" fill="#16213e" rx="15" ry="15" />
    <circle cx="200" cy="100" class="pulse" />
    <circle cx="600" cy="100" class="pulse" style="animation-delay: 1s;" />
    
    <path d="M 200 100 Q 400 40 600 100" fill="none" stroke="#0f3460" stroke-width="4" />
    <path d="M 200 100 Q 400 40 600 100" fill="none" stroke="#e94560" stroke-width="2" class="line-flow" />

    <path d="M 200 100 Q 400 160 600 100" fill="none" stroke="#0f3460" stroke-width="4" />
    <path d="M 200 100 Q 400 160 600 100" fill="none" stroke="#4facfe" stroke-width="2" class="line-flow" style="animation-duration: 2.5s;" />
    
    <text x="400" y="110" class="text-title">Bioelectronic Medicine Architect</text>
</svg>
